services:
  - type: web
    name: wemepet-api
    runtime: node
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: AUTH_JWKS_URL
        sync: false
      - key: AUTH_ISSUER
        sync: false
      - key: AUTH_AUDIENCE
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: S3_REGION
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        sync: false
      - key: CDN_BASE_URL
        sync: false

  - type: worker
    name: wemepet-outbox-worker
    runtime: node
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run worker:outbox
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
