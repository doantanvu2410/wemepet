version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: wemepet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: wemepet
      POSTGRES_USER: wemepet
      POSTGRES_PASSWORD: wemepet
    ports:
      - '5432:5432'
    volumes:
      - ./infra/docker/data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: wemepet-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

  minio:
    image: minio/minio:latest
    container_name: wemepet-minio
    restart: unless-stopped
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./infra/docker/minio:/data
